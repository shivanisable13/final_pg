version: '3.9'

# ============================================================
# CampusStay Production Docker Compose
# PHP + Apache + MySQL + phpMyAdmin
# ============================================================

services:


  # ==========================================================
  # PHP + APACHE APPLICATION
  # ==========================================================
  app:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: campusstay_app

    restart: always

    ports:
      - "80:80"

    environment:
      DB_HOST: db
      DB_NAME: campusstay
      DB_USER: campusstay_user
      DB_PASS: CampusStay2024
      APP_ENV: production

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - uploads_data:/var/www/html/uploads

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - campusstay_network

  # ==========================================================
  # MYSQL DATABASE
  # ==========================================================
  db:

    image: mysql:8.0

    container_name: campusstay_db

    restart: always

    environment:
      MYSQL_DATABASE: campusstay
      MYSQL_USER: campusstay_user
      MYSQL_PASSWORD: CampusStay2024
      MYSQL_ROOT_PASSWORD: RootPass2024

    command:
      --default-authentication-plugin=mysql_native_password

    ports:
      - "3307:3306"

    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-pRootPass2024"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - campusstay_network

  # ==========================================================
  # PHPMYADMIN
  # ==========================================================
  phpmyadmin:

    image: phpmyadmin:latest

    container_name: campusstay_phpmyadmin

    restart: always

    depends_on:
      - db

    ports:
      - "8081:80"

    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: RootPass2024

    networks:
      - campusstay_network

# ============================================================
# PERSISTENT VOLUMES
# ============================================================

volumes:
  db_data:
  uploads_data:

# ============================================================
# NETWORK
# ============================================================

networks:
  campusstay_network:
    driver: bridge
